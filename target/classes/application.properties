# ============================================
# Configuración de la aplicación
# ============================================
spring.application.name=carrito-compras
server.port=8080

# ============================================
# Base de datos H2 (Desarrollo / Pruebas)
# ============================================
spring.datasource.url=jdbc:h2:mem:carritobd;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================
# PostgreSQL (Producción) - descomentar para usar
# ============================================
# spring.datasource.url=jdbc:postgresql://localhost:5432/carritobd
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=tu_password

# ============================================
# JPA / Hibernate
# ============================================
# CORRECCIÓN: cambiar "update" a "create-drop" para H2 en memoria,
# así las tablas se crean limpias en cada arranque y data.sql funciona bien.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# Para PostgreSQL usar: org.hibernate.dialect.PostgreSQLDialect

# ============================================
# Datos iniciales de prueba
# CORRECCIÓN: defer-datasource-initialization=true es necesario para que
# data.sql se ejecute DESPUÉS de que Hibernate crea las tablas.
# ============================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
